<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bus Towns</title>
  <link rel="icon" type="image/png" href="images/bustowns logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@400;300&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #fdf8f5;
      font-family: 'Lato', sans-serif;
      color: #6b1a2a;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 4rem;
      margin: 0 0 0.4rem;
      color: #6b1a2a;
      letter-spacing: 0.02em;
    }

    .slogan {
      font-size: 1.3rem;
      font-weight: 300;
      letter-spacing: 0.05em;
      color: #8b2a3a;
      margin-bottom: 3rem;
    }

    .coming-soon {
      font-size: 0.95rem;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #a0435280;
    }
  </style>
</head>
<body>
  <img src="images/bustowns logo.png" alt="Bus Towns logo" style="height: 120px; margin-bottom: 1.5rem;">
  <h1>Bus Towns 🚌</h1>
  <p class="slogan">where you can just show up at the stop!</p>
  <p class="coming-soon">more to come soon...</p>
</body>
</html>
